      - name: check_membership_probability
        "@type": Check
        "@id": "#check_membership_probability"
        description: Validate membership probability range
        expression: membership_probability >= 0 AND membership_probability <= 1


  - name: ModeledParameters
    "@id": "#ModeledParameters"
    description: "The ModeledParameters table contains derived/inferred parameters for sources listed in the Sources table.
      The combination of *source*, *parameter*, and *reference* is expected to be unique.
      The *parameter* name links to the ParameterList lookup table."
    primaryKey:
    - "#ModeledParameters.source"
    - "#ModeledParameters.parameter"
    - "#ModeledParameters.reference"

    columns:
    - name: source
      "@id": "#ModeledParameters.source"
      datatype: string
      length: 100
      description: Unique identifier for the source; links to Sources table
